<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CalcAI — Powered by Claude</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #0a0a0f;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    padding: 20px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 80%, rgba(0,255,170,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 20%, rgba(0,120,255,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,170,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,170,0.025) 1px, transparent 1px);
    background-size: 44px 44px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    width: 100%;
    max-width: 400px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
    padding: 0 4px;
  }
  .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #00ffaa, #0088ff);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
    box-shadow: 0 0 20px rgba(0,255,170,0.3);
  }
  .title { font-size: 14px; font-weight: 800; color: #fff; letter-spacing: 3px; text-transform: uppercase; }
  .subtitle { font-size: 10px; color: rgba(0,255,170,0.55); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }

  /* Shell */
  .shell {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 22px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(0,255,170,0.04),
      0 40px 80px rgba(0,0,0,0.7),
      inset 0 1px 0 rgba(255,255,255,0.05);
  }

  /* Display */
  .display {
    padding: 22px 22px 14px;
    background: rgba(0,0,0,0.45);
    border-bottom: 1px solid rgba(255,255,255,0.04);
    min-height: 120px;
    display: flex; flex-direction: column; justify-content: flex-end;
    position: relative;
  }
  .mode-badge {
    position: absolute; top: 14px; left: 18px;
    font-size: 9px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: rgba(0,255,170,0.45);
    border: 1px solid rgba(0,255,170,0.18); border-radius: 4px;
    padding: 2px 8px;
  }
  .history {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px; color: rgba(255,255,255,0.22);
    text-align: right; min-height: 18px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    margin-bottom: 4px;
  }
  .main-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 44px; color: #fff;
    text-align: right; line-height: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    letter-spacing: -1px;
    transition: color 0.15s;
  }
  .main-num.error { color: #ff5566; animation: errpulse 0.35s ease; }
  .main-num.sm { font-size: 30px; }
  .main-num.xs { font-size: 21px; }

  @keyframes errpulse {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  /* AI Panel */
  .ai-panel {
    margin: 12px 16px;
    border: 1px solid rgba(0,255,170,0.14);
    border-radius: 12px;
    overflow: hidden;
  }
  .ai-row {
    display: flex; align-items: center;
    background: rgba(0,255,170,0.04);
    padding: 9px 13px; gap: 8px;
  }
  .ai-icon { font-size: 14px; flex-shrink: 0; }
  .ai-input {
    flex: 1; background: none; border: none; outline: none;
    color: rgba(255,255,255,0.8);
    font-family: 'Syne', sans-serif; font-size: 13px;
  }
  .ai-input::placeholder { color: rgba(255,255,255,0.18); }
  .ai-btn {
    background: rgba(0,255,170,0.13);
    border: 1px solid rgba(0,255,170,0.28);
    border-radius: 6px; color: #00ffaa;
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
    padding: 5px 11px; cursor: pointer;
    text-transform: uppercase; font-family: 'Syne', sans-serif;
    transition: background 0.2s;
  }
  .ai-btn:hover { background: rgba(0,255,170,0.22); }
  .ai-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .ai-response {
    padding: 10px 14px;
    font-size: 12px; line-height: 1.6;
    color: rgba(255,255,255,0.55);
    background: rgba(0,0,0,0.35);
    border-top: 1px solid rgba(0,255,170,0.07);
    display: none;
  }
  .ai-response.show { display: block; }
  .ai-response .hl { color: #00ffaa; font-weight: 700; }

  .dots { display: inline-flex; gap: 3px; align-items: center; }
  .dot {
    width: 5px; height: 5px; background: #00ffaa; border-radius: 50%;
    animation: blink 1s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.18s; }
  .dot:nth-child(3) { animation-delay: 0.36s; }
  @keyframes blink {
    0%,100% { opacity: 0.2; transform: scale(0.75); }
    50% { opacity: 1; transform: scale(1); }
  }

  /* Button grid */
  .btn-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: rgba(255,255,255,0.035);
    padding: 1px;
  }
  .sci-grid { display: none; }
  .sci-grid.show { display: grid; }

  button.b {
    border: none; outline: none; cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 16px; font-weight: 600;
    height: 64px;
    display: flex; align-items: center; justify-content: center;
    transition: filter 0.1s, background 0.1s;
    position: relative; overflow: hidden;
    user-select: none; letter-spacing: 0.3px;
    -webkit-tap-highlight-color: transparent;
  }
  button.b:active { filter: brightness(1.25); }

  .b-num { background: #111118; color: rgba(255,255,255,0.82); }
  .b-num:hover { background: #16161f; }

  .b-op { background: #0d1929; color: #5aadff; font-size: 20px; }
  .b-op:hover { background: #101e30; }

  .b-fn { background: #0e1a12; color: rgba(0,255,170,0.72); font-size: 13px; font-weight: 700; letter-spacing: 0.5px; }
  .b-fn:hover { background: #131f17; }

  .b-eq {
    background: linear-gradient(135deg, #00cc88 0%, #0077ee 100%);
    color: #fff; font-size: 22px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.15);
  }
  .b-eq:hover { filter: brightness(1.1); }

  .b-clr { background: #180d0d; color: #ff5566; font-size: 13px; font-weight: 800; letter-spacing: 1px; }
  .b-clr:hover { background: #200f0f; }

  .span2 { grid-column: span 2; }

  /* Bottom toggle */
  .bottom-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 11px 20px;
    border-top: 1px solid rgba(255,255,255,0.04);
  }
  .tog-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.28); }
  .tog {
    width: 38px; height: 21px;
    background: rgba(255,255,255,0.09);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 11px; cursor: pointer; position: relative;
    transition: background 0.2s, border-color 0.2s;
  }
  .tog.on { background: rgba(0,255,170,0.22); border-color: rgba(0,255,170,0.38); }
  .tog::after {
    content: ''; position: absolute;
    top: 2px; left: 2px;
    width: 15px; height: 15px;
    background: rgba(255,255,255,0.38); border-radius: 50%;
    transition: left 0.2s, background 0.2s;
  }
  .tog.on::after { left: 19px; background: #00ffaa; }
</style>
</head>
<body>

<div class="grid-bg"></div>

<div class="wrapper">
  <!-- Header -->
  <div class="header">
    <div class="logo">⚡</div>
    <div>
      <div class="title">CalcAI</div>
      <div class="subtitle">Powered by Claude</div>
    </div>
  </div>

  <!-- Calculator Shell -->
  <div class="shell">

    <!-- Display -->
    <div class="display">
      <div class="mode-badge" id="modeBadge">STANDARD</div>
      <div class="history" id="history"></div>
      <div class="main-num" id="mainNum">0</div>
    </div>

    <!-- AI Panel -->
    <div class="ai-panel">
      <div class="ai-row">
        <span class="ai-icon">✦</span>
        <input class="ai-input" id="aiInput" placeholder="Ask AI… e.g. 'what is 15% of 240?'" autocomplete="off" />
        <button class="ai-btn" id="aiBtn" onclick="askAI()">ASK</button>
      </div>
      <div class="ai-response" id="aiResponse"></div>
    </div>

    <!-- Scientific Grid (hidden by default) -->
    <div class="btn-grid sci-grid" id="sciGrid">
      <button class="b b-fn" onclick="insertFn('sin')">sin</button>
      <button class="b b-fn" onclick="insertFn('cos')">cos</button>
      <button class="b b-fn" onclick="insertFn('tan')">tan</button>
      <button class="b b-fn" onclick="insertFn('log')">log</button>
      <button class="b b-fn" onclick="insertFn('ln')">ln</button>
      <button class="b b-fn" onclick="insertFn('sqrt')">√</button>
      <button class="b b-fn" onclick="inputChar('^')">x^y</button>
      <button class="b b-fn" onclick="inputChar('π')">π</button>
    </div>

    <!-- Main Button Grid -->
    <div class="btn-grid">
      <button class="b b-clr" onclick="clear_()">CLR</button>
      <button class="b b-fn" onclick="backspace()" style="font-size:20px">⌫</button>
      <button class="b b-fn" onclick="inputChar('(')">(</button>
      <button class="b b-fn" onclick="inputChar(')')">)</button>

      <button class="b b-num" onclick="inputChar('7')">7</button>
      <button class="b b-num" onclick="inputChar('8')">8</button>
      <button class="b b-num" onclick="inputChar('9')">9</button>
      <button class="b b-op" onclick="inputChar('÷')">÷</button>

      <button class="b b-num" onclick="inputChar('4')">4</button>
      <button class="b b-num" onclick="inputChar('5')">5</button>
      <button class="b b-num" onclick="inputChar('6')">6</button>
      <button class="b b-op" onclick="inputChar('×')">×</button>

      <button class="b b-num" onclick="inputChar('1')">1</button>
      <button class="b b-num" onclick="inputChar('2')">2</button>
      <button class="b b-num" onclick="inputChar('3')">3</button>
      <button class="b b-op" onclick="inputChar('−')">−</button>

      <button class="b b-num span2" onclick="inputChar('0')">0</button>
      <button class="b b-num" onclick="inputChar('.')">.</button>
      <button class="b b-op" onclick="inputChar('+')">+</button>

      <button class="b b-fn span2" onclick="percent()">%</button>
      <button class="b b-eq span2" onclick="calculate()">=</button>
    </div>

    <!-- Bottom Bar -->
    <div class="bottom-bar">
      <span class="tog-label">Scientific Mode</span>
      <div class="tog" id="sciTog" onclick="toggleSci()"></div>
    </div>

  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────
  let display = '0';
  let historyStr = '';
  let waitNext = false;
  let sciOn = false;
  let isErr = false;

  // ── DOM refs ───────────────────────────────────────────
  const numEl   = document.getElementById('mainNum');
  const histEl  = document.getElementById('history');
  const badge   = document.getElementById('modeBadge');
  const sciGrid = document.getElementById('sciGrid');
  const sciTog  = document.getElementById('sciTog');
  const aiInput = document.getElementById('aiInput');
  const aiBtn   = document.getElementById('aiBtn');
  const aiResp  = document.getElementById('aiResponse');

  // ── Render ─────────────────────────────────────────────
  function render() {
    numEl.textContent = display;
    numEl.className = 'main-num' +
      (isErr ? ' error' : '') +
      (display.length > 14 ? ' xs' : display.length > 9 ? ' sm' : '');
    histEl.textContent = historyStr;
  }

  // ── Input handlers ─────────────────────────────────────
  function inputChar(ch) {
    isErr = false;
    if (waitNext) {
      // Starting a fresh operand after = or operator
      display = (ch === '.') ? '0.' : ch;
      waitNext = false;
    } else {
      if (ch === '.' && display.split(/[\+\-\×\÷\(\^]/).pop().includes('.')) return;
      display = (display === '0' && ch !== '.' && !'(+-×÷^π'.includes(ch))
        ? ch
        : display + ch;
    }
    render();
  }

  function insertFn(fn) {
    isErr = false;
    const append = fn + '(';
    display = (display === '0') ? append : display + append;
    waitNext = false;
    render();
  }

  function clear_() {
    display = '0'; historyStr = ''; waitNext = false; isErr = false;
    render();
  }

  function backspace() {
    if (display === 'Error' || display.length <= 1) {
      display = '0';
    } else {
      display = display.slice(0, -1);
    }
    isErr = false;
    render();
  }

  function percent() {
    try {
      const v = parseFloat(safeEval(display));
      display = String(v / 100);
    } catch { display = 'Error'; isErr = true; }
    render();
  }

  // ── Evaluation ─────────────────────────────────────────
  function safeEval(expr) {
    const s = expr
      .replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-')
      .replace(/\^/g, '**')
      .replace(/sin\(/g, 'Math.sin(')
      .replace(/cos\(/g, 'Math.cos(')
      .replace(/tan\(/g, 'Math.tan(')
      .replace(/log\(/g, 'Math.log10(')
      .replace(/ln\(/g, 'Math.log(')
      .replace(/sqrt\(/g, 'Math.sqrt(')
      .replace(/π/g, 'Math.PI')
      .replace(/\be\b/g, 'Math.E');
    // eslint-disable-next-line no-new-func
    const result = Function('"use strict"; return (' + s + ')')();
    if (!isFinite(result)) throw new Error('Non-finite');
    return parseFloat(result.toPrecision(12));
  }

  function calculate() {
    const expr = display;
    try {
      const result = safeEval(expr);
      historyStr = expr + ' =';
      display = String(result);
      waitNext = true;
      isErr = false;
    } catch {
      historyStr = expr;
      display = 'Error';
      isErr = true;
      waitNext = false;
    }
    render();
  }

  // ── Scientific toggle ──────────────────────────────────
  function toggleSci() {
    sciOn = !sciOn;
    sciGrid.classList.toggle('show', sciOn);
    sciTog.classList.toggle('on', sciOn);
    badge.textContent = sciOn ? 'SCIENTIFIC' : 'STANDARD';
  }

  // ── Keyboard support ───────────────────────────────────
  document.addEventListener('keydown', e => {
    if (document.activeElement === aiInput) return;
    const k = e.key;
    if (k >= '0' && k <= '9') inputChar(k);
    else if (k === '+') inputChar('+');
    else if (k === '-') inputChar('−');
    else if (k === '*') inputChar('×');
    else if (k === '/') { e.preventDefault(); inputChar('÷'); }
    else if (k === '.') inputChar('.');
    else if (k === '(') inputChar('(');
    else if (k === ')') inputChar(')');
    else if (k === '%') percent();
    else if (k === 'Enter' || k === '=') calculate();
    else if (k === 'Backspace') backspace();
    else if (k === 'Escape' || k === 'c' || k === 'C') clear_();
  });

  // ── AI Integration ─────────────────────────────────────
  async function askAI() {
    const question = aiInput.value.trim();
    if (!question) return;

    aiBtn.disabled = true;
    aiResp.className = 'ai-response show';
    aiResp.innerHTML = '<span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>';

    const prompt = `You are an AI assistant embedded in a calculator app. The calculator currently shows: "${display}".
User's question: "${question}"
Be concise (under 80 words). If they want a calculation, give the answer and brief explanation. Wrap key numbers/results in **double asterisks** for emphasis.`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });
      const data = await res.json();
      const text = (data.content || []).map(b => b.text || '').join('');

      // Render **bold** as highlighted spans
      const formatted = text.replace(/\*\*(.*?)\*\*/g, '<span class="hl">$1</span>');
      aiResp.innerHTML = formatted || 'No response received.';

      // Auto-populate if answer looks like a pure number
      const numMatch = text.match(/(?:=|is|answer[:\s]+)\s*([-\d,.]+)/i);
      if (numMatch) {
        const num = numMatch[1].replace(/,/g, '');
        if (!isNaN(num)) { display = num; waitNext = true; render(); }
      }
    } catch {
      aiResp.innerHTML = '<span style="color:#ff5566">AI unavailable — check network or API key.</span>';
    }

    aiBtn.disabled = false;
    aiInput.value = '';
  }

  aiInput.addEventListener('keydown', e => { if (e.key === 'Enter') askAI(); });

  // ── Init ───────────────────────────────────────────────
  render();
</script>
</body>
</html>
